version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"        # expoe Ollama para o host
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-proxy:
    build: ./proxy           # pasta onde esta seu proxy.py
    container_name: ollama-proxy
    ports:
      - "8000:8000"          # expoe proxy estilo OpenAI
    depends_on:
      - ollama
    environment:
      # variavel de ambiente para o proxy saber onde esta o Ollama
      OLLAMA_URL: "http://ollama:11434/api/chat"
    restart: unless-stopped

volumes:
  ollama_data:
