version: "3.9"
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-proxy:
    build: ./proxy
    container_name: ollama-proxy
    ports:
      - "8000:8000"
    depends_on:
      - ollama

volumes:
  ollama_data:
